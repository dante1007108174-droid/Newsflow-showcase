    - id: "1675660"
      type: code
      title: 清理格式&固定时间
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 4320
        y: 583.575
      parameters:
        code: |
            import json
            import re

            async def main(args) -> dict:
                # 正确取值路径！
                s = args.params['input_json']

                # 1) json.loads 解析
                html = ""
                try:
                    d = json.loads(s)
                    if isinstance(d, list) and d:
                        html = d[0].get("html_content", "") or ""
                    elif isinstance(d, dict):
                        html = d.get("html_content", "") or ""
                except:
                    pass

                # 2) 兜底：直接截 HTML
                if not html:
                    i = s.find("<!DOCTYPE html>")
                    if i != -1:
                        j = s.rfind("</html>")
                        if j != -1:
                            html = s[i:j + len("</html>")]

                # 3) 清洗转义 + 时间改 08:00
                if html:
                    html = (html
                        .replace('\\"', '"')
                        .replace('\\n', '\n')
                        .replace('\\/', '/')
                        .replace('\\\\', '\\')
                    )
                    html = re.sub(r"(\d{2}:\d{2})(?=\s*星期)", "08:00", html)

                    # 4) 标题文案替换（保留主题关键词）
                    # Match examples:
                    # - 这是为您精选的<br>24小时“AI”资讯
                    # - 这是为您精选的24小时"AI"资讯
                    title_pattern = r"这是为您精选的(?:\s*<br\s*/?>\s*)?24小时\s*[\u201C\u201D\"\uFF02](.*?)[\u201C\u201D\"\uFF02]\s*资讯"
                    html = re.sub(
                        title_pattern,
                        r"这是为您测试专用的“\1”资讯简报",
                        html,
                        count=1,
                    )

                return {
                    "clean_html": html
                }
        language: 3
        node_inputs:
            - name: input_json
              input:
                value:
                    path: body
                    ref_node: "1581884"
        node_outputs:
            clean_html:
                type: string
                value: null
            debug_attrs:
                type: string
                value: null
            debug_vars:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
