    - id: "131669"
      type: code
      title: Parse_Limit
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 2480
        y: 372.27500000000003
      parameters:
        code: |
            import json

            async def main(args) -> dict:
                raw = args.params.get("limit_body", "")

                data = raw
                if isinstance(data, str):
                    try:
                        data = json.loads(data)
                    except:
                        data = []

                if isinstance(data, list) and len(data) > 0:
                    val = data[0].get("allowed")
                    count = data[0].get("current_count", 0)

                    if val is True or str(val).lower() == "true":
                        # 当前这次还没算进去，所以剩余 = 限制 - 已发 - 1(本次)
                        left = 99 - count - 1
                        if left < 0:
                            left = 0
                        return {"allowed": "yes", "remaining": str(left)}

                return {"allowed": "no", "remaining": "0"}
        language: 3
        node_inputs:
            - name: limit_body
              input:
                value:
                    path: body
                    ref_node: "1570729"
        node_outputs:
            allowed:
                type: string
                value: null
            remaining:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            timeoutMs: 60000
