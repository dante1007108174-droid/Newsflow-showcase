    - id: "191016"
      type: code
      title: pick email
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1100
        y: 266.625
      parameters:
        code: |
            import json

            async def main(args) -> dict:
                to_email = args.params.get("to_email", "").strip()
                queried = args.params.get("queried", "")

                # 1. 用户给了邮箱，直接用
                if to_email:
                    return {"final_email": to_email, "status": "ok"}

                # 2. 没给，从查询结果里提取
                data = queried
                if isinstance(data, str):
                    try:
                        data = json.loads(data)
                    except:
                        data = []

                if isinstance(data, list) and len(data) > 0:
                    email = data[0].get("email", "")
                    if email:
                        return {"final_email": email, "status": "ok"}

                # 3. 都没有
                return {"final_email": "", "status": "no_email"}
        language: 3
        node_inputs:
            - name: to_email
              input:
                value:
                    path: input_email
                    ref_node: "100001"
            - name: queried
              input:
                value:
                    path: body
                    ref_node: "1355139"
        node_outputs:
            final_email:
                type: string
                value: null
            status:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            timeoutMs: 60000
