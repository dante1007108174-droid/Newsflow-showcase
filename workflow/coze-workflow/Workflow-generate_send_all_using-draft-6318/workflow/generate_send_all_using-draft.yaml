    - id: "1433533"
      type: code
      title: AI&科技-rss解析_1
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1560
        y: 163.3
      parameters:
        code: "import xml.etree.ElementTree as ET\nimport re\nimport json\nfrom urllib.request import urlopen, Request\nfrom datetime import datetime, timedelta, timezone\nfrom email.utils import parsedate_to_datetime\nfrom collections import Counter\n\n# ============================================================\n# 基础工具函数\n# ============================================================\n\ndef get_beijing_time():\n    utc_now = datetime.now(timezone.utc)\n    return utc_now + timedelta(hours=8)\n\ndef is_chinese_content(text):\n    if not text:\n        return False\n    chinese_chars = len(re.findall(r'[\\u4e00-\\u9fa5]', text))\n    total_chars = len(re.sub(r'\\s+', '', text))\n    return chinese_chars / total_chars >= 0.30 if total_chars > 0 else False\n\ndef process_content(html_text):\n    if not html_text: \n        return \"\"\n    clean_text = re.sub(r'<[^>]+>', '', html_text)\n    clean_text = re.sub(r'[\\r\\n\\t]+', ' ', clean_text).strip()\n    clean_text = re.sub(r'\\s+', ' ', clean_text)\n    limit = 350 \n    return clean_text[:limit] + \"...\" if len(clean_text) > limit else clean_text\n\ndef parse_time(raw_time):\n    if not raw_time:\n        now = get_beijing_time()\n        return now.strftime(\"%Y-%m-%d %H:%M\"), int(now.timestamp())\n    \n    dt_obj = None\n    raw_time = raw_time.strip()\n    \n    try:\n        dt_obj = parsedate_to_datetime(raw_time)\n    except:\n        pass\n\n    if dt_obj is None:\n        try:\n            dt_obj = datetime.strptime(\" \".join(raw_time.split()), \"%Y-%m-%d %H:%M:%S %z\")\n        except:\n            pass\n            \n    if dt_obj is None:\n        try:\n            dt_obj = datetime.fromisoformat(raw_time)\n        except:\n            pass\n\n    if dt_obj:\n        try:\n            tz_beijing = timezone(timedelta(hours=8))\n            dt_beijing = dt_obj.astimezone(tz_beijing)\n            return dt_beijing.strftime(\"%Y-%m-%d %H:%M\"), int(dt_beijing.timestamp())\n        except:\n            pass\n\n    now = get_beijing_time()\n    return now.strftime(\"%Y-%m-%d %H:%M\"), int(now.timestamp())\n\n# ============================================================\n# 增强版语义去重\n# ============================================================\n\ndef extract_keywords(text):\n    if not text:\n        return set()\n    \n    keywords = set()\n    english_brands = re.findall(r'\\b[A-Z][A-Za-z0-9]*(?:\\s[A-Z][A-Za-z0-9]*)*\\b', text)\n    keywords.update([b.lower() for b in english_brands if len(b) >= 2])\n    chinese_words = re.findall(r'[\\u4e00-\\u9fa5]{2,4}', text)\n    keywords.update(chinese_words)\n    numbers = re.findall(r'\\d+(?:\\.\\d+)?(?:亿|万|%|美元|元)?', text)\n    keywords.update(numbers)\n    stop_words = {'发布', '宣布', '表示', '报道', '消息', '显示', '公司', '企业', '市场', '今日', '今天'}\n    keywords = keywords - stop_words\n    \n    return keywords\n\ndef calculate_semantic_similarity(title1, title2, desc1=\"\", desc2=\"\"):\n    kw1_title = extract_keywords(title1)\n    kw2_title = extract_keywords(title2)\n    kw1_desc = extract_keywords(desc1[:100])\n    kw2_desc = extract_keywords(desc2[:100])\n    \n    kw1 = kw1_title | kw1_desc\n    kw2 = kw2_title | kw2_desc\n    \n    if not kw1 or not kw2:\n        return 0\n    \n    intersection = len(kw1 & kw2)\n    union = len(kw1 | kw2)\n    base_score = intersection / union if union > 0 else 0\n    \n    core_entities = {\n        'openai', 'google', 'microsoft', 'apple', 'nvidia', 'meta', 'amazon',\n        'anthropic', 'deepseek', 'bytedance', '字节', '华为', '腾讯', '阿里',\n        '百度', '小米', '特斯拉', 'tesla', 'spacex', '英伟达', 'minimax',\n        '苹果', '三星', 'samsung', '比亚迪', '蔚来', '理想', '小鹏'\n    }\n    \n    shared_core = (kw1 & kw2) & core_entities\n    if shared_core:\n        base_score = min(1.0, base_score + 0.3)\n    \n    event_patterns = {\n        '融资': ['融资', '注资', '投资', '估值'],\n        '发布': ['发布', '推出', '上线', '发售'],\n        '合作': ['合作', '联合', '携手'],\n    }\n    \n    text1 = title1 + desc1[:50]\n    text2 = title2 + desc2[:50]\n    \n    for event_type, patterns in event_patterns.items():\n        match1 = any(p in text1 for p in patterns)\n        match2 = any(p in text2 for p in patterns)\n        if match1 and match2 and shared_core:\n            base_score = min(1.0, base_score + 0.2)\n            break\n    \n    return base_score\n\ndef smart_deduplicate(items, threshold=0.50):\n    if not items:\n        return []\n    \n    items.sort(key=lambda x: (len(x.get('description', '')), x.get('_timestamp', 0)), reverse=True)\n    \n    unique_items = []\n    \n    for item in items:\n        is_duplicate = False\n        matched_index = -1\n        \n        for idx, existing in enumerate(unique_items):\n            similarity = calculate_semantic_similarity(\n                item['title'], \n                existing['title'],\n                item.get('description', ''),\n                existing.get('description', '')\n            )\n            \n            if similarity > threshold:\n                is_duplicate = True\n                matched_index = idx\n                break\n        \n        if not is_duplicate:\n            item['_heat_count'] = 1\n            item['_sources_list'] = [item['source']]\n            item['_best_link'] = item['link']\n            item['_content_length'] = len(item.get('description', ''))\n            unique_items.append(item)\n        else:\n            existing = unique_items[matched_index]\n            existing['_heat_count'] = existing.get('_heat_count', 1) + 1\n            \n            sources = existing.get('_sources_list', [])\n            if item['source'] not in sources:\n                sources.append(item['source'])\n            existing['_sources_list'] = sources\n            \n            if len(item.get('description', '')) > existing.get('_content_length', 0):\n                existing['_best_link'] = item['link']\n                existing['_content_length'] = len(item.get('description', ''))\n    \n    return unique_items\n\n# ============================================================\n# 热点词提取\n# ============================================================\n\ndef extract_trending_words(news_items, top_n=20):\n    stop_words = {\n        '的', '了', '是', '在', '和', '与', '或', '等', '中', '为', '将', '已', '被',\n        '今日', '今天', '昨日', '消息', '报道', '表示', '显示', '发布', '宣布',\n        'the', 'a', 'an', 'is', 'are', 'to', 'of', 'in', 'for', 'and', 'or',\n    }\n    \n    words = []\n    for item in news_items:\n        title = item.get('title', '')\n        chinese_words = re.findall(r'[\\u4e00-\\u9fa5]{2,6}', title)\n        words.extend(chinese_words)\n        english_words = re.findall(r'[A-Za-z][A-Za-z0-9\\.]*[A-Za-z0-9]', title)\n        words.extend([w for w in english_words if len(w) >= 2])\n    \n    word_counts = Counter([w.lower() for w in words if w.lower() not in stop_words])\n    return [word for word, count in word_counts.most_common(top_n) if count >= 2]\n\n# ============================================================\n# 信源均衡\n# ============================================================\n\ndef balance_sources(items, max_total=80, max_per_source_ratio=0.40, min_per_source=3):\n    if not items:\n        return []\n    \n    source_groups = {}\n    for item in items:\n        source = item.get('source', '未知')\n        if source not in source_groups:\n            source_groups[source] = []\n        source_groups[source].append(item)\n    \n    for source in source_groups:\n        source_groups[source].sort(\n            key=lambda x: (x.get('_heat_count', 1), x.get('_score', 0), x.get('_timestamp', 0)), \n            reverse=True\n        )\n    \n    max_per_source = max(min_per_source, int(max_total * max_per_source_ratio))\n    final_items = []\n    \n    for source, group_items in source_groups.items():\n        take_count = min(len(group_items), min_per_source)\n        final_items.extend(group_items[:take_count])\n    \n    remaining = max_total - len(final_items)\n    round_index = min_per_source\n    \n    while remaining > 0:\n        added_this_round = False\n        for source, group_items in source_groups.items():\n            current_source_count = sum(1 for i in final_items if i.get('source') == source)\n            if round_index < len(group_items) and current_source_count < max_per_source:\n                final_items.append(group_items[round_index])\n                remaining -= 1\n                added_this_round = True\n                if remaining <= 0:\n                    break\n        if not added_this_round:\n            break\n        round_index += 1\n    \n    return final_items\n\n# ============================================================\n# RSS 抓取 - 带错误诊断\n# ============================================================\n\ndef fetch_source_data_with_error(src):\n    news_items = []\n    error_msg = None\n    headers = {'User-Agent': 'Mozilla/5.0 (compatible; CozeBot/1.0)'}\n    \n    try:\n        req = Request(src[\"url\"], headers=headers)\n        response = urlopen(req, timeout=15.0)\n        xml_data = response.read()\n        root = ET.fromstring(xml_data)\n        \n        items = root.findall('./channel/item')\n        if not items: \n            items = root.findall('.//{http://www.w3.org/2005/Atom}entry')\n\n        for item in items:\n            title = item.find('title').text if item.find('title') is not None else \"无标题\"\n            link = item.find('link').text if item.find('link') is not None else \"\"\n            \n            if not is_chinese_content(title):\n                continue\n            \n            content_encoded = item.find('{http://purl.org/rss/1.0/modules/content/}encoded')\n            description = item.find('description')\n            if description is None: \n                description = item.find('{http://purl.org/rss/1.0/modules/content/}encoded')\n            \n            raw_desc = \"\"\n            if content_encoded is not None and content_encoded.text:\n                raw_desc = content_encoded.text\n            elif description is not None and description.text:\n                raw_desc = description.text\n            \n            description_text = process_content(str(raw_desc))\n            \n            if not is_chinese_content(description_text):\n                continue\n            \n            pub_date = item.find('pubDate').text if item.find('pubDate') is not None else \"\"\n            time_str, timestamp = parse_time(pub_date)\n\n            news_items.append({\n                \"title\": title,\n                \"description\": description_text,\n                \"link\": link,\n                \"time_code\": time_str,\n                \"source\": src[\"source\"],\n                \"_timestamp\": timestamp\n            })\n            \n    except Exception as e:\n        error_msg = str(type(e).__name__) + \": \" + str(e)[:80]\n    \n    return src[\"source\"], news_items, error_msg\n\n# ============================================================\n# 主函数\n# ============================================================\n\nasync def main(args):\n    now_obj = get_beijing_time()\n    current_time_str = now_obj.strftime(\"%Y-%m-%d %H:%M\")\n    \n    one_day_ago = now_obj - timedelta(hours=24)\n    threshold_timestamp = int(one_day_ago.timestamp())\n\n    # ============================================================\n    # \U0001F527 修复：安全获取参数（不使用默认值）\n    # ============================================================\n    raw_input = None\n    \n    try:\n        raw_input = args.get('search_keywords')\n    except:\n        pass\n    \n    if not raw_input:\n        try:\n            params = args.get('params')\n            if params:\n                if isinstance(params, dict):\n                    raw_input = params.get('search_keywords')\n                elif hasattr(params, 'get'):\n                    raw_input = params.get('search_keywords')\n        except:\n            pass\n\n    # 解析关键词\n    search_terms = []\n    if raw_input:\n        try:\n            if isinstance(raw_input, str) and raw_input.startswith('['):\n                search_terms = json.loads(raw_input)\n            elif isinstance(raw_input, str):\n                search_terms = [t.strip().lower() for t in raw_input.replace('，', ',').split(',') if t.strip()]\n            elif isinstance(raw_input, list):\n                search_terms = raw_input\n        except:\n            search_terms = [str(raw_input).strip().lower()]\n    \n    search_terms = [str(t).lower() for t in search_terms if t]\n\n    # 12个RSS源\n    rss_sources = [\n        {\"source\": \"IT之家\", \"url\": \"https://www.ithome.com/rss/\"},\n        {\"source\": \"36氪\", \"url\": \"https://rss.aishort.top/?type=36kr\"},\n        {\"source\": \"虎嗅\", \"url\": \"https://rss.huxiu.com/\"},\n        {\"source\": \"钛媒体\", \"url\": \"https://www.tmtpost.com/rss.xml\"},\n        {\"source\": \"界面\", \"url\": \"https://a.jiemian.com/index.php?m=article&a=rss\"},\n        {\"source\": \"AIbase\", \"url\": \"https://rsshub.rssforever.com/aibase/news\"},\n        {\"source\": \"量子位\", \"url\": \"https://rsshub.rssforever.com/qbitai/category/%E8%B5%84%E8%AE%AF\"},\n        {\"source\": \"机器之心\", \"url\": \"https://rsshub.rssforever.com/jiqizhixin\"},\n        {\"source\": \"华尔街见闻\", \"url\": \"https://dedicated.wallstreetcn.com/rss.xml\"},\n        {\"source\": \"快科技\", \"url\": \"https://rsshub.rssforever.com/mydrivers\"},\n        {\"source\": \"爱范儿\", \"url\": \"https://rsshub.rssforever.com/ifanr/app\"},\n        {\"source\": \"少数派\", \"url\": \"https://sspai.com/feed\"}\n    ]\n    \n    # 统计数据结构\n    source_stats = {}\n    for src in rss_sources:\n        source_stats[src[\"source\"]] = {\"fetched\": 0, \"time_ok\": 0, \"matched\": 0, \"output\": 0, \"error\": None}\n    \n    all_raw_items = []\n    \n    # 串行抓取（带错误诊断）\n    for src in rss_sources:\n        source_name, raw_items, error_msg = fetch_source_data_with_error(src)\n        \n        source_stats[source_name][\"fetched\"] = len(raw_items)\n        source_stats[source_name][\"error\"] = error_msg\n        \n        # 时间过滤\n        time_filtered = []\n        for item in raw_items:\n            ts = item.get('_timestamp')\n            if ts is None:\n                ts = 0\n            if ts >= threshold_timestamp:\n                time_filtered.append(item)\n        \n        source_stats[source_name][\"time_ok\"] = len(time_filtered)\n        \n        # 关键词匹配\n        matched_items = []\n        for item in time_filtered:\n            relevance_score = 0\n            is_match = False\n            \n            if not search_terms:\n                is_match = True\n                relevance_score = 1\n            else:\n                title_lower = item['title'].lower()\n                desc_lower = item['description'].lower()\n                for term in search_terms:\n                    if term in title_lower:\n                        relevance_score += 100\n                        is_match = True\n                    elif term in desc_lower:\n                        relevance_score += 50\n                        is_match = True\n            \n            if is_match:\n                item['_score'] = relevance_score\n                matched_items.append(item)\n        \n        source_stats[source_name][\"matched\"] = len(matched_items)\n        all_raw_items.extend(matched_items)\n\n    # 热点词\n    trending_words = extract_trending_words(all_raw_items, top_n=20)\n\n    # 去重\n    before_dedup = len(all_raw_items)\n    deduplicated_items = smart_deduplicate(all_raw_items, threshold=0.50)\n    after_dedup = len(deduplicated_items)\n    \n    # 信源均衡\n    balanced_items = balance_sources(deduplicated_items)\n    \n    # 统计最终输出\n    for item in balanced_items:\n        src = item.get('source', '')\n        if src in source_stats:\n            source_stats[src][\"output\"] += 1\n    \n    # 排序\n    balanced_items.sort(\n        key=lambda x: (\n            x.get('_heat_count', 1),\n            x.get('_score', 0),\n            x.get('_timestamp', 0)\n        ), \n        reverse=True\n    )\n    \n    # 构建输出\n    result_list = []\n    for idx, item in enumerate(balanced_items):\n        best_link = item.get('_best_link')\n        if not best_link:\n            best_link = item['link']\n        \n        heat = item.get('_heat_count')\n        if heat is None:\n            heat = 1\n            \n        result_list.append({\n            \"rank\": idx + 1,\n            \"title\": item['title'],\n            \"description\": item['description'],\n            \"link\": best_link,\n            \"time_code\": item['time_code'],\n            \"source\": item['source'],\n            \"heat_count\": heat\n        })\n\n    # ============================================================\n    # Debug 输出\n    # ============================================================\n    \n    debug_lines = []\n    debug_lines.append(\"=\" * 60)\n    debug_lines.append(\"RSS 新闻抓取报告\")\n    debug_lines.append(\"=\" * 60)\n    debug_lines.append(\"时间: \" + current_time_str)\n    \n    kw_display = \", \".join(search_terms[:5])\n    if len(search_terms) > 5:\n        kw_display += \"...\"\n    debug_lines.append(\"关键词: \" + kw_display)\n    debug_lines.append(\"\")\n    \n    debug_lines.append(\"-\" * 60)\n    debug_lines.append(\"信源抓取详情:\")\n    debug_lines.append(\"-\" * 60)\n    \n    total_fetched = 0\n    total_time_ok = 0\n    total_matched = 0\n    total_output = 0\n    error_count = 0\n    \n    for src in rss_sources:\n        name = src[\"source\"]\n        stats = source_stats[name]\n        \n        total_fetched += stats[\"fetched\"]\n        total_time_ok += stats[\"time_ok\"]\n        total_matched += stats[\"matched\"]\n        total_output += stats[\"output\"]\n        \n        err = stats[\"error\"]\n        if err:\n            error_count += 1\n            debug_lines.append(\"[X] \" + name + \": \" + err)\n        elif stats[\"output\"] > 0:\n            debug_lines.append(\"[Y] \" + name + \": 抓取\" + str(stats[\"fetched\"]) + \" 输出\" + str(stats[\"output\"]))\n        elif stats[\"fetched\"] > 0:\n            debug_lines.append(\"[-] \" + name + \": 抓取\" + str(stats[\"fetched\"]) + \" 命中0\")\n        else:\n            debug_lines.append(\"[X] \" + name + \": 无数据\")\n    \n    debug_lines.append(\"-\" * 60)\n    debug_lines.append(\"合计: 抓取\" + str(total_fetched) + \" 输出\" + str(total_output))\n    debug_lines.append(\"错误源: \" + str(error_count) + \"/\" + str(len(rss_sources)))\n    debug_lines.append(\"-\" * 60)\n    debug_lines.append(\"\")\n    debug_lines.append(\"去重: \" + str(before_dedup) + \" -> \" + str(after_dedup))\n    debug_lines.append(\"最终: \" + str(len(result_list)) + \" 条\")\n    \n    if trending_words:\n        debug_lines.append(\"热点词: \" + \", \".join(trending_words[:8]))\n    \n    debug_lines.append(\"=\" * 60)\n    \n    debug_info = \"\\n\".join(debug_lines)\n\n    return {\n        \"result\": result_list,\n        \"debug_info\": debug_info,\n        \"current_time\": current_time_str\n    }\n"
