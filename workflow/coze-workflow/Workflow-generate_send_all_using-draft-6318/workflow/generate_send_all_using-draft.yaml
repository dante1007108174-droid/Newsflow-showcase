条 | 剩余全部 |\n| N > 20 | 8 条 | 最多 10 条 |\n\n---\n\n# Output Format\n\n纯 JSON，禁止 Markdown。\n\n{\n    \"top_news\": [ \n        {\n            \"title\": \"精炼标题\",\n            \"tag\": \"具体领域标签\",\n            \"time\": \"YYYY-MM-DD HH:mm\", \n            \"summary\": \"100-120字摘要\",\n            \"source\": \"单个来源\",\n            \"link\": \"原文链接\"\n        }\n    ],\n    \"quick_news\": [\n        {\n            \"title\": \"标题\",\n            \"time\": \"YYYY-MM-DD HH:mm\",\n            \"source\": \"来源\",\n            \"link\": \"链接\"\n        }\n    ]\n}\n"
