      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1100
        y: 105.65
      parameters:
        code: "import json\n\nasync def main(args):\n    # 初始化默认返回结构\n    ret = {\n        \"allowed\": False,\n        \"msg\": \"\",\n        \"email\": \"\",\n        \"keyword\": \"\"\n    }\n    \n    try:\n        # 1. 安全获取 params\n        # 不使用 args['params'] 或 'params' in args，防止触发底层对象的奇怪行为\n        # 直接尝试用 get 获取，如果为 None 则说明 args 本身可能就是扁平的\n        params = args.get('params')\n        if params is None:\n            params = args\n            \n        # 2. 安全获取 response_body\n        body_str = params.get('response_body')\n        \n        if not body_str:\n            ret['msg'] = \"未获取到 response_body (Input Empty)\"\n            return ret\n\n        # 3. 鲁棒的 JSON 解析\n        data = None\n        if isinstance(body_str, dict):\n            data = body_str\n        else:\n            try:\n                # 第一次解析\n                data = json.loads(body_str)\n                # 处理双重转义字符串情况: \"{\\\"key\\\":...}\" -> \"{\"key\":...}\" (str) -> dict\n                if isinstance(data, str):\n                    data = json.loads(data)\n            except Exception as e:\n                ret['msg'] = f\"JSON格式解析失败: {str(e)}\"\n                return ret\n\n        # 4. 安全赋值\n        if isinstance(data, dict):\n            # bool() 转换确保类型正确\n            ret['allowed'] = bool(data.get('allowed'))\n            \n            # str() + or \"\" 确保即使是 None 也能转为空字符串\n            ret['email'] = str(data.get('email') or \"\")\n            ret['keyword'] = str(data.get('keyword') or \"\")\n            \n            # 优先取 msg，没有则取 message\n            raw_msg = data.get('msg')\n            if not raw_msg:\n                raw_msg = data.get('message')\n            ret['msg'] = str(raw_msg) if raw_msg else \"操作成功\"\n        else:\n            ret['msg'] = f\"解析结果不是字典类型，而是: {type(data)}\"\n\n    except Exception as e:\n        # 捕获所有代码逻辑中的未知错误\n        ret['msg'] = f\"系统执行异常: {str(e)}\"\n        \n    return ret\n"
        language: 3
        node_inputs:
