      parameters:
        code: "import json\nimport re\nfrom datetime import datetime, timedelta\n\nasync def main(args):\n    # ================= 1. 获取并解析数据 =================\n    # 获取 HTTP 节点输出的 body 字符串\n    raw_body = args.params.get('input') \n    \n    # 初始化 html_content\n    html_content = \"\"\n    \n    try:\n        # 如果 input 本身就是 dict/list (Coze有时会自动转)，直接用\n        if isinstance(raw_body, (dict, list)):\n            data = raw_body\n        else:\n            # 否则尝试将字符串解析为 JSON\n            data = json.loads(raw_body)\n            \n        # 兼容两种返回结构：\n        # 情况A (Table API/RPC返回列表): [{\"content\": \"...\"}]\n        if isinstance(data, list) and len(data) > 0:\n            html_content = data[0].get('content', '')\n        # 情况B (RPC返回字典): {\"content\": \"...\"}\n        elif isinstance(data, dict):\n            html_content = data.get('content', '')\n            \n    except Exception as e:\n        print(f\"JSON 解析失败: {e}\")\n        return {\"content\": \"<h1>数据读取失败</h1>\"}\n\n    if not html_content:\n        return {\"content\": \"<h1>今日暂无归档内容</h1>\"}\n\n    # ================= 2. 更新时间与问候语 (保持你原有的优秀逻辑) =================\n    utc_now = datetime.utcnow()\n    beijing_now = utc_now + timedelta(hours=8)\n    weekdays = [\"星期一\", \"星期二\", \"星期三\", \"星期四\", \"星期五\", \"星期六\", \"星期日\"]\n    weekday_str = weekdays[beijing_now.weekday()]\n    \n    # 目标时间字符串\n    new_date_str = beijing_now.strftime(\"%Y年%m月%d日 %H:%M\") + \" \" + weekday_str\n\n    # 正则替换：更新 header-date\n    pattern = r'(<p class=\"header-date\">\\s*<span>)(.*?)(</span>)'\n    new_html, count = re.subn(pattern, fr'\\g<1>{new_date_str}\\g<3>', html_content, flags=re.DOTALL | re.IGNORECASE)\n\n    # 正则替换：更新问候语\n    try:\n        h = beijing_now.hour\n        current_greeting = \"早上好\" if 5<=h<11 else \"中午好\" if 11<=h<13 else \"下午好\" if 13<=h<18 else \"晚上好\"\n        # 匹配 <h1>任意问候语，\n        greeting_pattern = r'(<h1>)(.*?)(，这是为您精选)'\n        new_html = re.sub(greeting_pattern, fr'\\g<1>{current_greeting}\\g<3>', new_html, count=1)\n    except:\n        pass\n\n    # ================= 3. 返回结果 =================\n    return {\n        \"content\": new_html\n    }\n"
