    - id: "1083602"
      type: code
      title: 文本处理（修改）
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1610.4090076862465
        y: 145.69345516787064
      parameters:
        code: "async function main(params) {\n    console.log(\"=== DEBUG START ===\");\n    console.log(\"Full Params:\", JSON.stringify(params));\n\n    // 1. 自动解包：应对 params.params 的情况\n    let realParams = params.params || params;\n    \n    // 2. 模糊读取：不管你是 raw_response 还是 rawResponse，都能读到\n    // 同时也兼容有些人直接把 body 传进来了\n    let inputData = realParams.raw_response || realParams.rawResponse || realParams.body || realParams.data;\n    \n    console.log(\"Raw Input Data:\", inputData);\n\n    let finalMessage = \"操作成功\"; // 默认值\n\n    try {\n        if (!inputData) {\n            throw new Error(\"没有收到任何数据\");\n        }\n\n        // 3. 智能解析\n        // 如果它已经是对象(Object)，直接用\n        // 如果它是字符串(String)，尝试 JSON.parse\n        let dataObj = inputData;\n        if (typeof inputData === 'string') {\n            // 只有当字符串看起来像 JSON 时才解析\n            if (inputData.trim().startsWith('{')) {\n                dataObj = JSON.parse(inputData);\n            }\n        }\n\n        // 4. 提取 message 字段\n        // 优先找 message，找不到找 msg，再找不到就直接用整个对象转字符串\n        if (dataObj && (dataObj.message || dataObj.msg)) {\n            finalMessage = dataObj.message || dataObj.msg;\n        } else if (typeof dataObj === 'string') {\n            finalMessage = dataObj;\n        } else {\n            finalMessage = JSON.stringify(dataObj);\n        }\n\n    } catch (e) {\n        console.log(\"解析失败，降级处理:\", e.message);\n        // 如果实在解析不了，就把原始数据转成字符串硬返回，保证不为空\n        finalMessage = String(inputData || \"未知返回结果\");\n    }\n\n    // 5. 最终输出\n    console.log(\"Final Output Text:\", finalMessage);\n    return {\n        text: finalMessage\n    };\n}\n"
        language: 5
        node_inputs:
            - name: raw_response
              input:
                value:
                    path: body
                    ref_node: "1581884"
        node_outputs:
            text:
                type: string
                value: null
        settingOnError:
