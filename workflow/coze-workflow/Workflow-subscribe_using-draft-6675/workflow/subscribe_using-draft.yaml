    - id: "1282947"
      type: code
      title: 文本处理（查询）
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 1610.4090076862465
        y: 304.28409564532194
      parameters:
        code: "async function main(params) {\n    // === 1. 究极解包 (应对各种嵌套) ===\n    let realParams = params.params || params;\n    let inputData = realParams.raw_response || realParams.body || realParams.data;\n    \n    // === 2. 解析逻辑 ===\n    let dataObj = null;\n    try {\n        if (typeof inputData === 'object' && inputData !== null) {\n            dataObj = inputData;\n        } else if (typeof inputData === 'string') {\n            // 简单清洗一下字符串，防止首尾有奇怪字符\n            dataObj = JSON.parse(inputData.trim());\n        }\n    } catch (e) {\n        return { text: `数据解析错误: ${e.message} (原始数据: ${String(inputData)})` };\n    }\n\n    if (!dataObj) {\n        return { text: \"未接收到有效数据。\" };\n    }\n\n    // === 3. 核心判断 (不使用全等 ===，改用宽松判断) ===\n    // 有时候 true 可能是字符串 \"true\"\n    const isSuccess = (String(dataObj.success) === 'true');\n\n    if (isSuccess && dataObj.data) {\n        const info = dataObj.data;\n        const statusMap = {\n            'active': '✅ 订阅生效中',\n            'inactive': '⏸️ 已暂停/取消'\n        };\n        // 默认显示 raw status，如果有映射就用映射\n        const statusText = statusMap[info.status] || `❓ ${info.status}`;\n\n        const displayText = `\U0001F4CB **当前订阅信息**\n\n\U0001F4E7 **邮箱**: ${info.email || '未绑定'}\n\U0001F511 **主题**: ${info.keyword || '未设置'}\n\U0001F4E1 **状态**: ${statusText}\n\U0001F552 **更新时间**: ${info.updated_at || '刚刚'}\n\n\U0001F4A1 如需修改，请说“修改订阅”；如需退订，请说“取消订阅”。`;\n        \n        return { text: displayText };\n    }\n\n    // 失败情况\n    const failMsg = dataObj.message || dataObj.msg || \"未找到订阅记录。\";\n    return { text: failMsg };\n}\n"
        language: 5
