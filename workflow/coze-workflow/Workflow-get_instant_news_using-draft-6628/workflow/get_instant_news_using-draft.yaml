    - id: "1787941"
      type: code
      title: rss解析、获取时间、预筛选_2
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 2480
        y: 81.025
      parameters:
        code: "import xml.etree.ElementTree as ET\nimport re\nimport time\nimport json\nfrom urllib.request import urlopen, Request\nfrom datetime import datetime, timedelta, timezone\nfrom concurrent.futures import ThreadPoolExecutor, as_completed\nfrom email.utils import parsedate_to_datetime\nfrom collections import Counter\n\n# ============================================================\n# 工具函数\n# ============================================================\n\ndef get_beijing_time():\n    utc_now = datetime.now(timezone.utc)\n    beijing_now = utc_now + timedelta(hours=8)\n    return beijing_now.strftime(\"%Y-%m-%d %H:%M\")\n\n\ndef process_content(html_text):\n    if not html_text:\n        return \"\", None\n    \n    img_match = re.search(r'<img[^>]+src=[\\'\"]([^\\'\"]+)[\\'\"]', html_text, re.IGNORECASE)\n    img_url = img_match.group(1) if img_match else None\n    \n    clean_text = re.sub(r'<[^>]+>', '', html_text)\n    clean_text = re.sub(r'[\\r\\n\\t]+', ' ', clean_text).strip()\n    \n    summary = clean_text[:200] + \"...\" if len(clean_text) > 200 else clean_text\n    return summary, img_url\n\n\ndef parse_time(raw_time):\n    if not raw_time:\n        return get_beijing_time(), int(time.time())\n    \n    dt_obj = None\n    raw_time = raw_time.strip()\n    \n    try:\n        dt_obj = parsedate_to_datetime(raw_time)\n    except:\n        pass\n\n    if dt_obj is None:\n        try:\n            clean_time = \" \".join(raw_time.split())\n            dt_obj = datetime.strptime(clean_time, \"%Y-%m-%d %H:%M:%S %z\")\n        except:\n            pass\n            \n    if dt_obj is None:\n        try:\n            dt_obj = datetime.fromisoformat(raw_time)\n        except:\n            pass\n\n    if dt_obj:\n        try:\n            tz_beijing = timezone(timedelta(hours=8))\n            dt_beijing = dt_obj.astimezone(tz_beijing)\n            return dt_beijing.strftime(\"%Y-%m-%d %H:%M\"), int(dt_beijing.timestamp())\n        except:\n            pass\n\n    return get_beijing_time(), int(time.time())\n\n\n# ============================================================\n# 关键词解析\n# ============================================================\n\ndef parse_search_input(raw_input):\n    if not raw_input:\n        return []\n    \n    try:\n        if isinstance(raw_input, str):\n            raw_input = raw_input.strip()\n            if raw_input.startswith('['):\n                data = json.loads(raw_input)\n                return [str(t).strip().lower() for t in data if t]\n            elif raw_input.startswith('{'):\n                data = json.loads(raw_input)\n                return [str(t).strip().lower() for t in data.get('flat', []) if t]\n            else:\n                return [t.strip().lower() for t in raw_input.replace(',', ',').split(',') if t.strip()]\n        elif isinstance(raw_input, list):\n            return [str(t).strip().lower() for t in raw_input if t]\n    except:\n        pass\n    \n    return []\n\n\n# ============================================================\n# 热点词提取\n# ============================================================\n\ndef extract_trending_words(news_items, top_n=30):\n    stop_words = {\n        '的', '了', '是', '在', '和', '与', '或', '等', '中', '为', '也', '将', '已', '被',\n        '对', '从', '到', '有', '这', '那', '你', '我', '他', '她', '它', '们', '能', '可',\n        '个', '多', '大', '小', '新', '最', '更', '很', '都', '就', '还', '要', '会', '让',\n        '上', '下', '年', '月', '日', '时', '分', '秒', '元', '万', '亿', '约', '近', '超',\n        '第一', '第二', '第三', '如何', '什么', '怎么', '为什么', '可以', '可能', '应该',\n        '今日', '今天', '昨日', '昨天', '明日', '明天', '本周', '本月', '今年', '去年',\n        '消息', '报道', '表示', '显示', '发布', '宣布', '公布', '透露', '称', '据',\n        '公司', '企业', '市场', '行业', '领域', '方面', '情况', '问题', '方案', '计划',\n        'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being',\n        'to', 'of', 'in', 'on', 'at', 'for', 'with', 'by', 'from', 'up', 'down',\n        'and', 'or', 'but', 'not', 'as', 'this', 'that', 'it', 'its',\n        'new', 'first', 'last', 'next', 'now', 'just', 'more', 'most', 'very',\n    }\n    \n    words = []\n    for item in news_items:\n        title = item.get('title', '')\n        chinese_words = re.findall(r'[\\u4e00-\\u9fa5]{2,6}', title)\n        words.extend(chinese_words)\n        english_words = re.findall(r'[A-Za-z][A-Za-z0-9\\.]*[A-Za-z0-9]', title)\n        words.extend([w for w in english_words if len(w) >= 2])\n    \n    word_counts = Counter([w.lower() for w in words if w.lower() not in stop_words])\n    return [word for word, count in word_counts.most_common(top_n) if count >= 2]\n\n\ndef filter_relevant_trending(trending_words, search_terms):\n    if not search_terms:\n        return trending_words[:15]\n    \n    relevant = []\n    for word in trending_words:\n        for term in search_terms:\n            if word in term or term in word:\n                relevant.append(word)\n                break\n    \n    top_trending = [w for w in trending_words[:5] if w not in relevant]\n    return relevant + top_trending\n\n\n# ============================================================\n# 相关性计算\n# ============================================================\n\ndef calc_relevance(title, description, search_terms, trending_words=None):\n    if not search_terms and not trending_words:\n        return True, 1\n    \n    title_lower = title.lower() if title else \"\"\n    desc_lower = description.lower() if description else \"\"\n    \n    score = 0\n    matched = False\n    \n    for term in search_terms:\n        if term in title_lower:\n            score += 100\n            matched = True\n        elif term in desc_lower:\n            score += 40\n            matched = True\n    \n    if trending_words and matched:\n        for tw in trending_words:\n            if tw in title_lower:\n                score += 15\n    \n    return matched, score\n\n\n# ============================================================\n# RSS 抓取\n# ============================================================\n\ndef fetch_source_raw(src):\n    news_items = []\n    headers = {'User-Agent': 'Mozilla/5.0 (compatible; NewsBot/1.0)'}\n    \n    try:\n        req = Request(src[\"url\"], headers=headers)\n        response = urlopen(req, timeout=3.0)\n        xml_data = response.read()\n        root = ET.fromstring(xml_data)\n        \n        items = root.findall('./channel/item')\n        if not items:\n            items = root.findall('.//{http://www.w3.org/2005/Atom}entry')\n\n        for item in items:\n            title_node = item.find('title')\n            title = title_node.text if title_node is not None and title_node.text else \"\"\n            \n            link_node = item.find('link')\n            link = \"\"\n            if link_node is not None:\n                link = link_node.text if link_node.text else link_node.get('href', '')\n            \n            desc_node = item.find('description')\n            if desc_node is None:\n                desc_node = item.find('{http://purl.org/rss/1.0/modules/content/}encoded')\n            raw_desc = desc_node.text if desc_node is not None else \"\"\n            \n            description, cover_image = process_content(str(raw_desc) if raw_desc else \"\")\n            \n            pub_date_node = item.find('pubDate')\n            pub_date = pub_date_node.text if pub_date_node is not None else \"\"\n            time_str, timestamp = parse_time(pub_date)\n            \n            news_items.append({\n                \"title\": title,\n                \"description\": description,\n                \"link\": link,\n                \"time_code\": time_str,\n                \"source\": src[\"source\"],\n                \"cover_image\": cover_image,\n                \"_timestamp\": timestamp\n            })\n                \n    except:\n        pass\n    \n    return src[\"source\"], news_items\n\n\n# ============================================================\n# 主运行函数\n# ============================================================\n\nasync def main(args: Args) -> Output:\n    current_time_str = get_beijing_time()\n    \n    # === 解析关键词 ===\n    raw_input = args.get('params', {}).get('search_keywords') or args.get('search_keywords')\n    search_terms = parse_search_input(raw_input)\n    \n    # === RSS 源配置 ===\n    rss_sources = [\n        {\"source\": \"IT之家\", \"url\": \"https://www.ithome.com/rss/\"},\n        {\"source\": \"36氪\", \"url\": \"https://36kr.com/feed\"},\n        {\"source\": \"虎嗅\", \"url\": \"https://rss.huxiu.com/\"},\n        {\"source\": \"华尔街见闻\", \"url\": \"https://dedicated.wallstreetcn.com/rss.xml\"},\n        {\"source\": \"中新网\", \"url\": \"http://www.chinanews.com.cn/rss/scroll-news.xml\"},\n        {\"source\": \"钛媒体\", \"url\": \"https://www.tmtpost.com/rss.xml\"},\n        {\"source\": \"界面\", \"url\": \"https://a.jiemian.com/index.php?m=article&a=rss\"},\n        {\"source\": \"新华社\", \"url\": \"http://www.xinhuanet.com/politics/news_politics.xml\"}\n    ]\n    \n    # === 并发抓取 ===\n    all_raw_items = []\n    source_raw_counts = {}\n    \n    with ThreadPoolExecutor(max_workers=10) as executor:\n        future_to_src = {executor.submit(fetch_source_raw, src): src for src in rss_sources}\n        \n        for future in as_completed(future_to_src):\n            try:\n                source_name, items = future.result()\n                source_raw_counts[source_name] = len(items)\n                all_raw_items.extend(items)\n            except:\n                src = future_to_src[future]\n                source_raw_counts[src[\"source\"]] = 0\n    \n    # === 提取热点词 ===\n    trending_words = extract_trending_words(all_raw_items, top_n=30)\n    relevant_trending = filter_relevant_trending(trending_words, search_terms)\n    \n    # === 筛选匹配 ===\n    source_matched = {src[\"source\"]: 0 for src in rss_sources}\n    all_matched_items = []\n    \n    for item in all_raw_items:\n        is_match, score = calc_relevance(item['title'], item['description'], search_terms, relevant_trending)\n        if is_match:\n            item['_score'] = score\n            all_matched_items.append(item)\n            source_matched[item[\"source\"]] += 1\n    \n    # === 排序并限制每源数量 ===\n    all_matched_items.sort(key=lambda x: (x.get('_score', 0), x.get('_timestamp', 0)), reverse=True)\n    \n    MAX_PER_SOURCE = 25\n    source_output = {src[\"source\"]: 0 for src in rss_sources}\n    final_items = []\n    \n    for item in all_matched_items:\n        source_name = item[\"source\"]\n        if source_output[source_name] < MAX_PER_SOURCE:\n            final_items.append(item)\n            source_output[source_name] += 1\n    \n    # === 构建输出 ===\n    result_list = [{\n        \"title\": item['title'],\n        \"description\": item['description'],\n        \"link\": item['link'],\n        \"time_code\": item['time_code'],\n        \"source\": item['source']\n    } for item in final_items]\n    \n    # === 生成 debug 信息 ===\n    lines = []\n    \n    lines.append(\"[关键词]\")\n    lines.append(\"扩写词({}): {}\".format(len(search_terms), ', '.join(search_terms[:8])))\n    lines.append(\"热点词({}): {}\".format(len(relevant_trending), ', '.join(relevant_trending[:8])))\n    lines.append(\"\")\n    \n    lines.append(\"[信源明细] 抓取 > 命中 > 输出\")\n    total_raw = 0\n    total_matched = 0\n    total_output = 0\n    \n    for src in rss_sources:\n        name = src[\"source\"]\n        raw = source_raw_counts.get(name, 0)\n        matched = source_matched.get(name, 0)\n        output = source_output.get(name, 0)\n        \n        total_raw += raw\n        total_matched += matched\n        total_output += output\n        \n        if output > 0:\n            status = \"Y\"\n        elif matched > 0:\n            status = \"-\"\n        else:\n            status = \"X\"\n        \n        lines.append(\"[{}] {}: {} > {} > {}\".format(status, name, raw, matched, output))\n    \n    lines.append(\"\")\n    \n    lines.append(\"[汇总] 抓取 > 命中 > 输出\")\n    lines.append(\"总计: {} > {} > {}\".format(total_raw, total_matched, total_output))\n    lines.append(\"时间: {}\".format(current_time_str))\n\n    return {\n        \"result\": result_list,\n        \"debug_info\": \"\\n\".join(lines),\n        \"current_time\": current_time_str\n    }\n"
        language: 3
