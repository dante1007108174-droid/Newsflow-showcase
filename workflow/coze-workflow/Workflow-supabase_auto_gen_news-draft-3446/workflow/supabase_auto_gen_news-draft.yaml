                        description:
                            type: string
                            value: null
                        link:
                            type: string
                            value: null
                        source:
                            type: string
                            value: null
                        time_code:
                            type: string
                            value: null
                        title:
                            type: string
                            value: null
                    value: null
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
