    - id: "130575"
      type: code
      title: json序列化
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 3400
        y: 562.9499999999999
      parameters:
        code: "import json\n\nasync def main(args):\n    # 1. 获取输入\n    keyword = args.params.get('keyword', '')\n    if isinstance(keyword, str):\n        keyword = keyword.strip()\n    \n    raw_content = args.params.get('html_content')\n    \n    # 2. 暴力剥壳函数：循环解析 JSON 直到拿到真正的 HTML\n    def extract_html(data, depth=0):\n        # 防止无限循环\n        if depth > 10:\n            return str(data)\n        \n        # 如果是字典，尝试提取常见的 key\n        if isinstance(data, dict):\n            for key in ['final_html', 'content', 'html_content', 'html', 'body']:\n                if key in data:\n                    return extract_html(data[key], depth + 1)\n            # 如果没有匹配的 key，返回整个字典的字符串\n            return str(data)\n        \n        # 如果是字符串\n        if isinstance(data, str):\n            stripped = data.strip()\n            # 如果看起来像 JSON（以 { 或 [ 开头），尝试解析\n            if stripped.startswith('{') or stripped.startswith('['):\n                try:\n                    parsed = json.loads(stripped)\n                    return extract_html(parsed, depth + 1)\n                except:\n                    pass\n            # 如果以 <!DOCTYPE 或 <html 开头，说明已经是 HTML 了\n            if stripped.startswith('<!DOCTYPE') or stripped.startswith('<html') or stripped.startswith('<'):\n                return stripped\n            # 否则原样返回\n            return stripped\n        \n        # 其他类型\n        return str(data) if data else \"\"\n\n    # 3. 执行剥壳\n    real_html = extract_html(raw_content)\n    \n    # 4. 如果还是空的，给个提示\n    if not real_html:\n        real_html = \"<h1>未能解析出有效内容</h1>\"\n\n    # 5. 构造 Supabase RPC 需要的 payload\n    payload = {\n        \"p_keyword\": keyword,\n        \"p_content\": real_html\n    }\n    \n    # 6. 序列化为 JSON 字符串\n    json_payload = json.dumps(payload, ensure_ascii=False)\n    \n    return {\n        \"json_payload\": json_payload\n    }\n"
        language: 3
        node_inputs:
            - name: html_content
              input:
                value:
                    path: final_html
                    ref_node: "1635312"
            - name: keyword
              input:
                value:
                    path: keyword
                    ref_node: "100001"
        node_outputs:
            json_payload:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            timeoutMs: 60000
