nodes:
    - id: "1660996"
      type: code
      title: 科技-rss解析
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 180
        y: 26.000000000000007
      parameters:
        code: "import xml.etree.ElementTree as ET\nimport re\nimport time\nimport json\nfrom urllib.request import urlopen, Request\nfrom datetime import datetime, timedelta, timezone\nfrom concurrent.futures import ThreadPoolExecutor, as_completed\nfrom email.utils import parsedate_to_datetime\n\n# === 1. 工具函数：获取当前东八区时间 ===\ndef get_beijing_time():\n    utc_now = datetime.now(timezone.utc)\n    beijing_now = utc_now + timedelta(hours=8)\n    return beijing_now\n\n# === 2. 工具函数：清洗HTML (已回调为200字) ===\ndef process_content(html_text):\n    if not html_text: return \"\", None\n    \n    # 提取图片\n    img_match = re.search(r'<img[^>]+src=[\\'\"]([^\\'\"]+)[\\'\"]', html_text, re.IGNORECASE)\n    img_url = img_match.group(1) if img_match else None\n    \n    # 清洗标签\n    clean_text = re.sub(r'<[^>]+>', '', html_text)\n    clean_text = re.sub(r'[\\r\\n\\t]+', ' ', clean_text).strip()\n    \n    # \U0001F525 截断阈值设定为 200 字\n    limit = 200 \n    summary = clean_text[:limit] + \"...\" if len(clean_text) > limit else clean_text\n    \n    return summary, img_url\n\n# === 3. 工具函数：时间解析 (核心修复) ===\ndef parse_time(raw_time):\n    if not raw_time:\n        return get_beijing_time().strftime(\"%Y-%m-%d %H:%M\"), int(time.time())\n    \n    dt_obj = None\n    raw_time = raw_time.strip()\n    \n    # 尝试解析 1: 标准 RSS 格式\n    try:\n        dt_obj = parsedate_to_datetime(raw_time)\n    except:\n        pass\n\n    # 尝试解析 2: 非标格式\n    if dt_obj is None:\n        try:\n            clean_time = \" \".join(raw_time.split())\n            dt_obj = datetime.strptime(clean_time, \"%Y-%m-%d %H:%M:%S %z\")\n        except:\n            pass\n            \n    # 尝试解析 3: ISO 格式\n    if dt_obj is None:\n        try:\n            dt_obj = datetime.fromisoformat(raw_time)\n        except:\n            pass\n\n    # 转换为东八区时间对象\n    if dt_obj:\n        try:\n            tz_beijing = timezone(timedelta(hours=8))\n            dt_beijing = dt_obj.astimezone(tz_beijing)\n            return dt_beijing.strftime(\"%Y-%m-%d %H:%M\"), int(dt_beijing.timestamp())\n        except:\n            pass\n\n    return get_beijing_time().strftime(\"%Y-%m-%d %H:%M\"), int(time.time())\n\n# === 4. 单个源抓取逻辑 (优先获取全文但截断) ===\ndef fetch_source_data(src):\n    news_items = []\n    headers = {'User-Agent': 'Mozilla/5.0 (compatible; CozeBot/1.0)'}\n    try:\n        req = Request(src[\"url\"], headers=headers)\n        response = urlopen(req, timeout=8.0)\n        xml_data = response.read()\n        root = ET.fromstring(xml_data)\n        \n        items = root.findall('./channel/item')\n        if not items: items = root.findall('.//{http://www.w3.org/2005/Atom}entry')\n\n        for item in items:\n            title = item.find('title').text if item.find('title') is not None else \"无标题\"\n            link = item.find('link').text if item.find('link') is not None else \"\"\n            \n            # 优先尝试获取全文标签（即使后面会被截断，也比直接抓摘要好）\n            content_encoded = item.find('{http://purl.org/rss/1.0/modules/content/}encoded')\n            description = item.find('description')\n            \n            if description is None: \n                description = item.find('{http://purl.org/rss/1.0/modules/content/}encoded')\n            \n            raw_desc = \"\"\n            if content_encoded is not None and content_encoded.text:\n                raw_desc = content_encoded.text\n            elif description is not None and description.text:\n                raw_desc = description.text\n            \n            description_text, cover_image = process_content(str(raw_desc))\n            \n            # 获取时间并解析\n            pub_date = item.find('pubDate').text if item.find('pubDate') is not None else \"\"\n            time_str, timestamp = parse_time(pub_date)\n\n            news_items.append({\n                \"title\": title,\n                \"description\": description_text,\n                \"link\": link,\n                \"time_code\": time_str,\n                \"source\": src[\"source\"],\n                \"cover_image\": cover_image,\n                \"_timestamp\": timestamp\n            })\n    except Exception:\n        pass \n    \n    return src[\"source\"], news_items\n\n# === 5. 主运行函数 ===\nasync def main(args):\n    now_obj = get_beijing_time()\n    current_time_str = now_obj.strftime(\"%Y-%m-%d %H:%M\")\n    \n    # \U0001F525 计算24小时前的时间戳阈值\n    one_day_ago = now_obj - timedelta(hours=24)\n    threshold_timestamp = int(one_day_ago.timestamp())\n\n    # 解析关键词\n    raw_input = args.get('params', {}).get('search_keywords') or args.get('search_keywords')\n    search_terms = []\n    if raw_input:\n        try:\n            if isinstance(raw_input, str) and (raw_input.startswith('[') or raw_input.startswith('{')):\n                search_terms = json.loads(raw_input)\n            elif isinstance(raw_input, str):\n                search_terms = [t.strip().lower() for t in raw_input.replace('，', ',').split(',') if t.strip()]\n            elif isinstance(raw_input, list):\n                search_terms = raw_input\n        except:\n            search_terms = [str(raw_input).strip().lower()]\n    \n    search_terms = [str(t).lower() for t in search_terms if t]\n    debug_logs = [f\"\U0001F50E 当前搜索关键词: {json.dumps(search_terms, ensure_ascii=False)}\"]\n    debug_logs.append(f\"⏰ 时间过滤阈值: {one_day_ago.strftime('%Y-%m-%d %H:%M')} (timestamp: {threshold_timestamp})\")\n\n    rss_sources = [\n        {\"source\": \"IT之家\", \"url\": \"https://www.ithome.com/rss/\"},\n        {\"source\": \"AIbase\", \"url\": \"https://rsshub.rssforever.com/aibase/news\"},\n        {\"source\": \"36氪\", \"url\": \"https://rss.aishort.top/?type=36kr\"},\n        {\"source\": \"虎嗅\", \"url\": \"https://rss.huxiu.com/\"},\n        {\"source\": \"华尔街见闻\", \"url\": \"https://dedicated.wallstreetcn.com/rss.xml\"},\n        {\"source\": \"量子位\", \"url\": \"https://rsshub.rssforever.com/qbitai/category/%E8%B5%84%E8%AE%AF\"},\n        {\"source\": \"钛媒体\", \"url\": \"https://www.tmtpost.com/rss.xml\"},\n        {\"source\": \"界面\", \"url\": \"https://a.jiemian.com/index.php?m=article&a=rss\"},\n        {\"source\": \"新华社\", \"url\": \"http://www.xinhuanet.com/politics/news_politics.xml\"}\n    ]\n    \n    all_final_items = []\n    \n    with ThreadPoolExecutor(max_workers=10) as executor:\n        future_to_src = {executor.submit(fetch_source_data, src): src for src in rss_sources}\n        \n        for future in as_completed(future_to_src):\n            try:\n                source_name, raw_items = future.result()\n                raw_count = len(raw_items)\n                \n                filtered_items = []\n                for item in raw_items:\n                    # \U0001F525 第一道关卡：严格的时间过滤 (代码级拦截)\n                    if item.get('_timestamp', 0) < threshold_timestamp:\n                        continue # 直接跳过过期新闻\n\n                    relevance_score = 0\n                    is_match = False\n                    \n                    if not search_terms:\n                        is_match = True\n                        relevance_score = 1\n                    else:\n                        title_lower = item['title'].lower()\n                        desc_lower = item['description'].lower()\n                        for term in search_terms:\n                            if term in title_lower:\n                                relevance_score += 100\n                                is_match = True\n                            elif term in desc_lower:\n                                relevance_score += 50\n                                is_match = True\n                    \n                    if is_match:\n                        item['_score'] = relevance_score\n                        filtered_items.append(item)\n                \n                matched_count = len(filtered_items)\n                \n                # 排序并截取 (Per Source Limit)\n                filtered_items.sort(key=lambda x: (x.get('_score', 0), x.get('_timestamp', 0)), reverse=True)\n                final_source_items = filtered_items[:20] \n                output_count = len(final_source_items)\n                \n                all_final_items.extend(final_source_items)\n                debug_logs.append(f\"✅ [{source_name}] 抓取 {raw_count} -> 时效命中 {matched_count} -> 输出 {output_count}\")\n                \n            except Exception as e:\n                pass\n\n    # 全局排序\n    all_final_items.sort(key=lambda x: (x.get('_score', 0), x.get('_timestamp', 0)), reverse=True)\n    \n    result_list = []\n    for item in all_final_items:\n        result_list.append({\n            \"title\": item['title'],\n            \"description\": item['description'],\n            \"link\": item['link'],\n            \"time_code\": item['time_code'],\n            \"source\": item['source']\n        })\n\n    return {\n        \"result\": result_list,\n        \"debug_info\": \"\\n\".join(debug_logs),\n        \"current_time\": current_time_str\n    }"
        language: 3
        node_inputs:
            - name: search_keywords
              input:
                type: string
                value:
                    path: output
                    ref_node: "1341276"
        node_outputs:
